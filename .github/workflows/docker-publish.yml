name: Build and Publish Docker Image

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"

concurrency:
  group: docker-publish-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  context:
    name: Resolve Publish Context
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      major: ${{ steps.resolve.outputs.major }}
      minor: ${{ steps.resolve.outputs.minor }}
      publish_mode: ${{ steps.resolve.outputs.publish_mode }}
      publish_floating_tags: ${{ steps.resolve.outputs.publish_floating_tags }}
    steps:
      - name: Resolve publish mode
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          PUSH_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "release" && "$EVENT_ACTION" == "published" ]]; then
            tag="$RELEASE_TAG"
            publish_mode="release"
            publish_floating_tags="true"
          elif [[ "$EVENT_NAME" == "push" ]]; then
            tag="$PUSH_TAG"
          else
            echo "Unsupported event: $EVENT_NAME"
            exit 1
          fi

          if [[ ! "$tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Tag '$tag' must match v<major>.<minor>.<patch>."
            exit 1
          fi

          version="${tag#v}"
          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"

          if [[ "$EVENT_NAME" == "push" ]]; then
            publish_floating_tags="false"
            release_api="https://api.github.com/repos/$REPOSITORY/releases/tags/$tag"
            http_status=$(curl --silent --show-error --output /tmp/release.json --write-out '%{http_code}' \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$release_api")

            case "$http_status" in
              200)
                publish_mode="skip"
                ;;
              404)
                publish_mode="manual-tag"
                ;;
              *)
                echo "Failed to resolve release state for $tag (HTTP $http_status)."
                cat /tmp/release.json
                exit 1
                ;;
            esac
          fi

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "major=$major"
            echo "minor=$minor"
            echo "publish_mode=$publish_mode"
            echo "publish_floating_tags=$publish_floating_tags"
          } >> "$GITHUB_OUTPUT"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: context
    if: ${{ needs.context.outputs.publish_mode == 'manual-tag' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.context.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: context
    if: ${{ needs.context.outputs.publish_mode == 'manual-tag' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.context.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: context
    if: ${{ needs.context.outputs.publish_mode == 'manual-tag' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.context.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit Tests
        run: bun run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: context
    if: ${{ needs.context.outputs.publish_mode == 'manual-tag' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.context.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  docker-verify:
    name: Docker Verify
    runs-on: ubuntu-latest
    needs: context
    if: ${{ needs.context.outputs.publish_mode == 'manual-tag' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.context.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false

  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs:
      - context
      - lint
      - typecheck
      - unit
      - build
      - docker-verify
    if: >-
      ${{
        always() &&
        (needs.context.outputs.publish_mode == 'release' ||
          (needs.context.outputs.publish_mode == 'manual-tag' &&
            needs.lint.result == 'success' &&
            needs.typecheck.result == 'success' &&
            needs.unit.result == 'success' &&
            needs.build.result == 'success' &&
            needs.docker-verify.result == 'success'))
      }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.context.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check existing exact image tag
        id: existing-tag
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}
          VERSION: ${{ needs.context.outputs.version }}
        run: |
          set -euo pipefail

          if output=$(docker buildx imagetools inspect "$IMAGE:$VERSION" 2>&1); then
            exists=true
          else
            status=$?
            if printf '%s\n' "$output" | grep -Eqi 'not found|no such manifest|404'; then
              exists=false
            else
              printf '%s\n' "$output"
              exit "$status"
            fi
          fi

          echo "exists=$exists" >> "$GITHUB_OUTPUT"

      - name: Resolve publish actions
        id: publish-actions
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}
          VERSION: ${{ needs.context.outputs.version }}
          MINOR: ${{ needs.context.outputs.minor }}
          MAJOR: ${{ needs.context.outputs.major }}
          PUBLISH_FLOATING_TAGS: ${{ needs.context.outputs.publish_floating_tags }}
          EXACT_EXISTS: ${{ steps.existing-tag.outputs.exists }}
        run: |
          set -euo pipefail

          build_needed=false
          promote_needed=false
          build_tags="$IMAGE:$VERSION"
          floating_tags=""

          if [[ "$PUBLISH_FLOATING_TAGS" == "true" ]]; then
            floating_tags="$IMAGE:$MINOR,$IMAGE:$MAJOR,$IMAGE:latest"
            build_tags="$build_tags,$floating_tags"
          fi

          if [[ "$EXACT_EXISTS" != "true" ]]; then
            build_needed=true
          elif [[ "$PUBLISH_FLOATING_TAGS" == "true" ]]; then
            promote_needed=true
          fi

          {
            echo "build_needed=$build_needed"
            echo "promote_needed=$promote_needed"
            echo "build_tags=$build_tags"
            echo "floating_tags=$floating_tags"
            echo "source_ref=$IMAGE:$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        if: ${{ steps.publish-actions.outputs.build_needed == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.publish-actions.outputs.build_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Promote exact image to floating tags
        if: ${{ steps.publish-actions.outputs.promote_needed == 'true' }}
        env:
          SOURCE_REF: ${{ steps.publish-actions.outputs.source_ref }}
          FLOATING_TAGS: ${{ steps.publish-actions.outputs.floating_tags }}
        run: |
          set -euo pipefail

          args=()
          IFS=',' read -r -a tags <<< "$FLOATING_TAGS"
          for tag in "${tags[@]}"; do
            if [[ -n "$tag" ]]; then
              args+=(--tag "$tag")
            fi
          done

          if [[ "${#args[@]}" -eq 0 ]]; then
            exit 0
          fi

          docker buildx imagetools create "${args[@]}" "$SOURCE_REF"
