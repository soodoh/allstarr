name: Build and Publish Docker Image

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io

jobs:
  context:
    name: Resolve Publish Context
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      major: ${{ steps.resolve.outputs.major }}
      minor: ${{ steps.resolve.outputs.minor }}
      publish_mode: ${{ steps.resolve.outputs.publish_mode }}
      publish_floating_tags: ${{ steps.resolve.outputs.publish_floating_tags }}
    steps:
      - name: Resolve publish mode
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          PUSH_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "release" && "$EVENT_ACTION" == "published" ]]; then
            tag="$RELEASE_TAG"
            publish_mode="release"
            publish_floating_tags="true"
          elif [[ "$EVENT_NAME" == "push" ]]; then
            tag="$PUSH_TAG"
          else
            echo "Unsupported event: $EVENT_NAME"
            exit 1
          fi

          if [[ ! "$tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Tag '$tag' must match v<major>.<minor>.<patch>."
            exit 1
          fi

          version="${tag#v}"
          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"

          if [[ "$EVENT_NAME" == "push" ]]; then
            publish_floating_tags="false"

            if [[ "$GITHUB_ACTOR" == "github-actions[bot]" ]]; then
              publish_mode="skip"
            else
              release_api="https://api.github.com/repos/$REPOSITORY/releases/tags/$tag"
              http_status=$(curl --silent --show-error --output /tmp/release.json --write-out '%{http_code}' \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "$release_api")

              case "$http_status" in
                200)
                  publish_mode="skip"
                  ;;
                404)
                  publish_mode="manual-tag"
                  ;;
                *)
                  echo "Failed to resolve release state for $tag (HTTP $http_status)."
                  cat /tmp/release.json
                  exit 1
                  ;;
              esac
            fi
          fi

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "major=$major"
            echo "minor=$minor"
            echo "publish_mode=$publish_mode"
            echo "publish_floating_tags=$publish_floating_tags"
          } >> "$GITHUB_OUTPUT"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: context
    if: ${{ needs.context.outputs.publish_mode == 'manual-tag' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.context.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: context
    if: ${{ needs.context.outputs.publish_mode == 'manual-tag' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.context.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: context
    if: ${{ needs.context.outputs.publish_mode == 'manual-tag' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.context.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit Tests
        run: bun run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: context
    if: ${{ needs.context.outputs.publish_mode == 'manual-tag' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.context.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  docker-verify:
    name: Docker Verify
    runs-on: ubuntu-latest
    needs: context
    if: ${{ needs.context.outputs.publish_mode == 'manual-tag' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.context.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false

  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs:
      - context
      - lint
      - typecheck
      - unit
      - build
      - docker-verify
    if: >-
      ${{
        always() &&
        (needs.context.outputs.publish_mode == 'release' ||
          (needs.context.outputs.publish_mode == 'manual-tag' &&
            needs.lint.result == 'success' &&
            needs.typecheck.result == 'success' &&
            needs.unit.result == 'success' &&
            needs.build.result == 'success' &&
            needs.docker-verify.result == 'success'))
      }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.context.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.context.outputs.version }}
            type=raw,value=${{ needs.context.outputs.minor }},enable=${{ needs.context.outputs.publish_floating_tags == 'true' }}
            type=raw,value=${{ needs.context.outputs.major }},enable=${{ needs.context.outputs.publish_floating_tags == 'true' }}
            type=raw,value=latest,enable=${{ needs.context.outputs.publish_floating_tags == 'true' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
