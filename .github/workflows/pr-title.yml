name: PR Title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to validate
        required: true
        type: string

permissions:
  pull-requests: read

jobs:
  semantic-title:
    name: Conventional PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        if: ${{ github.event_name == 'pull_request_target' }}
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            perf
            test
            build
            ci
            revert

      - name: Validate dispatched PR title
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail

          title="$(gh pr view "$PR_NUMBER" --json title --jq '.title')"
          pattern='^(feat|fix|chore|docs|refactor|perf|test|build|ci|revert)(\([[:alnum:]_.-]+\))?(!)?: .+'

          if [[ ! "$title" =~ $pattern ]]; then
            echo "PR #$PR_NUMBER title is not a Conventional Commit:"
            echo "$title"
            exit 1
          fi
