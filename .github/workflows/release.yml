name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_ready: ${{ steps.release-context.outputs.release_ready }}
      tag_name: ${{ steps.release-context.outputs.tag_name }}
      version: ${{ steps.release-context.outputs.version }}
      major: ${{ steps.release-context.outputs.major }}
      minor: ${{ steps.release-context.outputs.minor }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Dispatch release PR validation
        if: ${{ steps.release.outputs.release_created != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ steps.release.outputs.pr }}
          PRS_JSON: ${{ steps.release.outputs.prs }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          pr_branch=""
          pr_number="$(printf '%s' "${PR_JSON:-}" | jq -r '.number // empty' 2>/dev/null || true)"
          if [[ -z "$pr_number" ]]; then
            pr_number="$(printf '%s' "${PRS_JSON:-}" | jq -r '.[0].number // empty' 2>/dev/null || true)"
          fi

          if [[ -z "$pr_number" ]]; then
            release_pr_row="$(gh pr list \
              --repo "$REPOSITORY" \
              --state open \
              --base main \
              --json number,headRefName \
              --jq '.[] | select(.headRefName | startswith("release-please--")) | [.number, .headRefName] | @tsv' | head -n1)"

            if [[ -n "$release_pr_row" ]]; then
              IFS=$'\t' read -r pr_number pr_branch <<< "$release_pr_row"
            fi
          fi

          if [[ -z "$pr_number" ]]; then
            echo "No open release PR found for validation dispatch"
            exit 0
          fi

          if [[ -z "$pr_branch" ]]; then
            pr_branch="$(gh pr view "$pr_number" --json headRefName --jq '.headRefName')"
          fi

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPOSITORY/actions/workflows/pr-title.yml/dispatches" \
            -f ref="$pr_branch" \
            -f inputs[pr_number]="$pr_number"

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPOSITORY/actions/workflows/ci.yml/dispatches" \
            -f ref="$pr_branch" \
            -f inputs[pr_number]="$pr_number"

      - name: Derive semver tags
        id: semver
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          echo "major=$(echo "$VERSION" | cut -d. -f1)" >> "$GITHUB_OUTPUT"
          echo "minor=$(echo "$VERSION" | cut -d. -f1-2)" >> "$GITHUB_OUTPUT"

      - name: Resolve release context
        id: release-context
        env:
          RELEASE_CREATED: ${{ steps.release.outputs.release_created }}
          RELEASE_TAG_NAME: ${{ steps.release.outputs.tag_name }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_MAJOR: ${{ steps.semver.outputs.major }}
          RELEASE_MINOR: ${{ steps.semver.outputs.minor }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          release_ready=false

          if [[ "$RELEASE_CREATED" == "true" ]]; then
            version="$RELEASE_VERSION"
            tag_name="$RELEASE_TAG_NAME"
            major="$RELEASE_MAJOR"
            minor="$RELEASE_MINOR"
            release_ready=true
          else
            version="$(node -p "require('./package.json').version")"
            tag_name="v$version"
            major="$(echo "$version" | cut -d. -f1)"
            minor="$(echo "$version" | cut -d. -f1-2)"

            if release_row=$(gh release view "$tag_name" --json tagName,targetCommitish --jq '[.tagName, .targetCommitish] | @tsv' 2>/tmp/release-view.err); then
              IFS=$'\t' read -r existing_tag target_commitish <<< "$release_row"
              if [[ "$existing_tag" == "$tag_name" && "$target_commitish" == "$HEAD_SHA" ]]; then
                release_ready=true
              fi
            else
              if grep -qi "release not found" /tmp/release-view.err; then
                :
              else
                cat /tmp/release-view.err
                exit 1
              fi
            fi
          fi

          {
            echo "release_ready=$release_ready"
            echo "tag_name=$tag_name"
            echo "version=$version"
            echo "major=$major"
            echo "minor=$minor"
          } >> "$GITHUB_OUTPUT"

  docker-publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_ready == 'true' }}
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.release-please.outputs.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image labels
        id: image-labels
        run: |
          set -euo pipefail

          revision="$(git rev-parse HEAD)"

          {
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=https://github.com/${{ github.repository }}"
            echo "org.opencontainers.image.revision=$revision"
            echo "org.opencontainers.image.version=${{ needs.release-please.outputs.version }}"
            echo "org.opencontainers.image.ref.name=${{ needs.release-please.outputs.tag_name }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ needs.release-please.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ needs.release-please.outputs.minor }}
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ needs.release-please.outputs.major }}
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
          labels: ${{ steps.image-labels.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
