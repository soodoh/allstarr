services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Los_Angeles
      WEBUI_PORT: 8081
    volumes:
      - qbittorrent-config:/config
      - ./data:/data
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: "service:gluetun"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Los_Angeles
    volumes:
      - prowlarr-config:/config
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  sabnzbd:
    image: ghcr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      TZ: America/Los_Angeles
      PUID: 1000
      PGID: 1000
    volumes:
      - sabnzbd-data:/config
      - ./data:/data

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8080:8080" # Sabnzbd
      - "8081:8081" # qbittorrent WebUI
      - "9696:9696" # Prowlarr
    volumes:
      - gluetun-data:/gluetun
    environment:
      VPN_SERVICE_PROVIDER: ${VPN_SERVICE_PROVIDER}
      VPN_TYPE: ${VPN_TYPE:-openvpn}
      OPENVPN_USER: ${OPENVPN_USER}
      OPENVPN_PASSWORD: ${OPENVPN_PASSWORD}
      SERVER_COUNTRIES: ${VPN_SERVER_COUNTRIES:-United States}
      # FIREWALL_OUTBOUND_SUBNETS: 192.168.0.0/16,172.16.0.0/12,10.0.0.0/8
      # Use DoH instead of DoT — port 853 gets reset by ProtonVPN (gluetun#3121)
      DNS_UPSTREAM_RESOLVER_TYPE: doh
    networks:
      app-net:
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  qbittorrent-config:
  prowlarr-config:
  gluetun-data:
  sabnzbd-data:

networks:
  app-net:
