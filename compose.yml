services:
  # Production build — comment this out during local development (use allstarr-dev below)
  # allstarr:
  #   image: allstarr
  #   container_name: allstarr
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - allstarr-data:/app/data
  #     - books:/books
  #   env_file: ".env"
  #   networks:
  #     - app-net
  #   depends_on:
  #     - gluetun

  # Dev server with hot reloading — mounts the host source tree into the container.
  # Any change to src/ is picked up immediately by Vite's HMR.
  allstarr:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: allstarr
    ports:
      - "3000:3000"
    volumes:
      # Mount the entire project directory so Vite/HMR sees every source change
      - .:/app
      # Persist node_modules in a named volume (Linux binaries, separate from
      # the macOS node_modules on the host) so we don't reinstall every time
      - allstarr-dev-modules:/app/node_modules
      # Persist the SQLite database across restarts
      - allstarr-data:/app/data
      - books:/books
    env_file: ".env"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=/app/data/sqlite.db
    networks:
      - app-net
    depends_on:
      - gluetun

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - WEBUI_PORT=8080
    volumes:
      - qbittorrent-config:/config
      - books:/books
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - prowlarr-config:/config
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8080:8080" # qbittorrent WebUI
      - "9696:9696" # Prowlarr
    volumes:
      - gluetun-data:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE:-openvpn}
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_COUNTRIES=${VPN_SERVER_COUNTRIES:-United States}
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  allstarr-data:
  allstarr-dev-modules:
  qbittorrent-config:
  prowlarr-config:
  gluetun-data:
  books:

networks:
  app-net:
